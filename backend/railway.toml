[build]
# Railway'e Dockerfile kullanmasını söyler
dockerfile = "Dockerfile"

[deploy]
# Uygulama sağlıklı mı diye Railway bu endpoint'i kontrol eder
healthcheckPath = "/api/nearby?latitude=0&longitude=0&radius=1"
healthcheckTimeout = 60

# Uygulama crash olursa Railway otomatik yeniden başlatır
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
