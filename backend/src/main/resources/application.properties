server.port=8070

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/placesdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Google Places API Key - set via env var GOOGLE_API_KEY
google.places.api.key=${GOOGLE_API_KEY:YOUR_API_KEY_HERE}
google.places.api.base-url=https://maps.googleapis.com/maps/api/place/nearbysearch/json
